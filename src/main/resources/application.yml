server:
  port: ${SERVER_PORT:8081}

spring:

  application:
    name: auth-service

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      ssl:
        enabled: true

  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    publisher-confirm-type: correlated
    publisher-returns: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES}

refresh:
  expiration-days: ${REFRESH_EXPIRATION_DAYS:7}

otp:
  length: ${OTP_LENGTH:6}
  expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
  max-attempts: ${OTP_MAX_ATTEMPTS:5}
  resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:60}
  secret: ${OTP_SECRET:${JWT_SECRET}}


azure:
  client-id: ${AZURE_CLIENT_ID}
  client-secret: ${AZURE_CLIENT_SECRET}
  redirect-uri: ${AZURE_REDIRECT_URI}
  token-url: https://login.microsoftonline.com/common/oauth2/v2.0/token
  jwks-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys

security:
  allowed-domains: ${ALLOWED_DOMAINS:@mail.escuelaing.edu.co,@escuelaing.edu.co}
  internal-api-key: ${INTERNAL_API_KEY}

usuario-service:
  url: ${USUARIO_SERVICE_URL}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

messaging:
  exchange: patricia.auth
  usuarios-exchange: patricia.usuarios
  queues:
    usuarios-suspendidos: auth.usuarios-suspendidos
    usuarios-baneados: auth.usuarios-baneados

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
