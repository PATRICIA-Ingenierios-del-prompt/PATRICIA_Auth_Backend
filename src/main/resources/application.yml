server:
  port: ${SERVER_PORT:8081}

spring:

  application:
    name: auth-service

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES}

refresh:
  expiration-days: ${REFRESH_EXPIRATION_DAYS}


azure:
  client-id: ${AZURE_CLIENT_ID}
  client-secret: ${AZURE_CLIENT_SECRET}
  tenant-id: ${AZURE_TENANT_ID}
  redirect-uri: ${AZURE_REDIRECT_URI}
  token-url: https://login.microsoftonline.com/common/oauth2/v2.0/token
  jwks-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys

security:
  allowed-domain: ${ALLOWED_DOMAIN}
  internal-api-key: ${INTERNAL_API_KEY}

usuario-service:
  url: ${USUARIO_SERVICE_URL}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

auth:
  dev-mode: ${AUTH_DEV_MODE:false}