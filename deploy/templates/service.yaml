# Name `auth` — matches Gateway's config.authServiceUri
# (http://auth.patricia-app.svc.cluster.local:8081).
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: patricia-app
  labels: { app: auth }
spec:
  type: ClusterIP
  selector: { app: auth }
  ports:
    - port: 8081
      targetPort: 8081
