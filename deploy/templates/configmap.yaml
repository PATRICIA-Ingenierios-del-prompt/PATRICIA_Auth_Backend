# Non-secret configuration. JWT_SECRET, RabbitMQ, Redis credentials, and the
# AZURE_CLIENT_ID / AZURE_CLIENT_SECRET / INTERNAL_API_KEY / RESEND_API_KEY
# quartet all come from the auth-secrets Secret synced by the ExternalSecret
# (see externalsecret.yaml) — none of them belong in this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: patricia-app
data:
  SERVER_PORT: {{ .Values.config.serverPort | quote }}
  JWT_EXPIRATION_MINUTES: {{ .Values.config.jwtExpirationMinutes | quote }}
  REFRESH_EXPIRATION_DAYS: {{ .Values.config.refreshExpirationDays | quote }}
  OTP_LENGTH: {{ .Values.config.otpLength | quote }}
  OTP_EXPIRATION_MINUTES: {{ .Values.config.otpExpirationMinutes | quote }}
  OTP_MAX_ATTEMPTS: {{ .Values.config.otpMaxAttempts | quote }}
  OTP_RESEND_COOLDOWN_SECONDS: {{ .Values.config.otpResendCooldownSeconds | quote }}
  OTP_SENDER: {{ .Values.config.otpSender | quote }}
  OTP_FROM_EMAIL: {{ .Values.config.otpFromEmail | quote }}
  ALLOWED_DOMAINS: {{ .Values.config.allowedDomains | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  USUARIO_SERVICE_URL: {{ .Values.config.usuarioServiceUrl | quote }}
  AZURE_REDIRECT_URI: {{ .Values.config.azureRedirectUri | quote }}
