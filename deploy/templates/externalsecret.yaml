# Pulls every secret Auth needs from AWS Secrets Manager into ONE native K8s
# Secret (auth-secrets) that the Deployment mounts via envFrom.
# Remote entries created by Ulink_Infra module.secrets — EXCEPT ${prefix}/auth
# (Azure OAuth + internal API key), which must be added there. See values.yaml.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: auth-secrets
    creationPolicy: Owner
  data:
    # --- shared JWT secret (same entry the Gateway reads) ---
    - secretKey: JWT_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/jwt-secret" }
    # --- cache Redis (Cluster #1) ---
    - secretKey: REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_HOST }
    - secretKey: REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PORT }
    - secretKey: REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PASSWORD }
    # --- Amazon MQ (RabbitMQ) ---
    - secretKey: RABBITMQ_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: RABBITMQ_HOST }
    - secretKey: RABBITMQ_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: RABBITMQ_PORT }
    - secretKey: RABBITMQ_USER
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: RABBITMQ_USER }
    - secretKey: RABBITMQ_PASS
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: RABBITMQ_PASS }
    # --- Auth-specific (add ${prefix}/auth to module.secrets) ---
    - secretKey: AZURE_CLIENT_ID
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/auth", property: AZURE_CLIENT_ID }
    - secretKey: AZURE_CLIENT_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/auth", property: AZURE_CLIENT_SECRET }
    - secretKey: INTERNAL_API_KEY
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/auth", property: INTERNAL_API_KEY }
