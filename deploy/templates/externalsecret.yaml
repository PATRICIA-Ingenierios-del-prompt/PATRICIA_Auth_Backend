# Pulls everything Auth needs from AWS Secrets Manager into a native K8s
# Secret (auth-secrets) that the Deployment mounts via envFrom.
#
# jwt-secret is a plain string in AWS SM (no `property`, the whole value is
# used) — this is the SAME entry Gateway reads to validate the tokens Auth
# signs, not a separate copy.
#
# amazon-mq and cache-redis are JSON blobs in AWS SM, so each field needs its
# own `property`. The secretKey names below are chosen to match Spring Boot's
# OWN property-binding env var convention (SPRING_RABBITMQ_*,
# SPRING_DATA_REDIS_PASSWORD) rather than the app's original custom
# RABBITMQ_HOST/RABBITMQ_USER placeholders — see the application.yml fix that
# must ship alongside this chart (addresses replaces host/port because Amazon
# MQ requires the amqps:// scheme + port 5671, which only the `addresses`
# property encodes correctly; Spring auto-detects and enables SSL from that
# scheme). REDIS_HOST/REDIS_PORT keep their existing names since the app
# already expects those exact ones; only the password is new (the app never
# declared a Redis password property, so injecting SPRING_DATA_REDIS_PASSWORD
# binds automatically with no application.yml change needed for that one).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: auth-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/jwt-secret" }
    - secretKey: SPRING_RABBITMQ_ADDRESSES
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_ADDRESSES }
    - secretKey: SPRING_RABBITMQ_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_USERNAME }
    - secretKey: SPRING_RABBITMQ_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_PASSWORD }
    - secretKey: REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_HOST }
    - secretKey: REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PORT }
    - secretKey: SPRING_DATA_REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PASSWORD }
    - secretKey: AZURE_CLIENT_ID
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/azure-client-id" }
    - secretKey: AZURE_CLIENT_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/azure-client-secret" }
    - secretKey: INTERNAL_API_KEY
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/internal-api-key" }
