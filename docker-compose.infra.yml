version: "3.8"

# SOLO infraestructura (Redis, RabbitMQ, Postgres). Los servicios Java
# (auth-service y usuarios-service) NO van aquí — esos los corres tú con
# `mvn spring-boot:run` en dos terminales, apuntando a estos puertos.
#
# Uso:
#   docker compose -f docker-compose.infra.yml up -d
#
# Deja correr esto en segundo plano y ya no lo vuelvas a tocar; cada
# `mvn spring-boot:run` se conecta a esta misma infraestructura.

services:

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: patricia-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-auth:
    image: redis:7.2-alpine
    container_name: patricia-redis-auth
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_auth_data:/data

  redis-usuarios:
    image: redis:7-alpine
    container_name: patricia-redis-usuarios
    restart: unless-stopped
    ports:
      - "6380:6379"   # puerto distinto en el host para no chocar con redis-auth
    volumes:
      - redis_usuarios_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: patricia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: usuarios_db
      POSTGRES_USER: usuarios_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - usuarios_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuarios_user -d usuarios_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  redis_auth_data:
  redis_usuarios_data:
  rabbitmq_data:
  usuarios_postgres_data:
