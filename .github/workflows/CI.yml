name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Branch contract (see PATRICIA_Deployment_Runbook.txt §1.3):
#   PRs      -> build + test + Sonar (quality gate blocks the merge)
#   develop  -> build + test + Sonar + push image to ECR (no deploy)
#   main     -> all of the above + helm deploy to EKS. Merging to main IS the
#               deploy button — keep main protected with required reviews.
#
# Required repo configuration (Settings -> Secrets and variables -> Actions):
#   secrets.AWS_CD_ROLE_ARN   IAM role assumed via GitHub OIDC (created in
#                             Ulink_Infra; needs ECR push + eks:DescribeCluster
#                             + an EKS access entry scoped to patricia-app)
#   vars.AWS_REGION           e.g. us-east-1
#   vars.ECR_REGISTRY         <account-id>.dkr.ecr.<region>.amazonaws.com
#   vars.EKS_CLUSTER_NAME     terraform output -raw eks_cluster_name
#   vars.API_BASE_URL         https://api.<domain> (for the post-deploy smoke check)
#   secrets.SONAR_*           already in use below

permissions:
  contents: read
  pull-requests: read

env:
  IMAGE_NAME: patricia-auth

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Compiles, runs unit tests (Surefire, *Test) + integration tests
      # (Failsafe, *IT), enforces the 80% coverage gate (-Pcoverage) and
      # packages the jar.
      - name: Build, test & coverage
        run: mvn -B clean verify -Pcoverage

      - name: Sonar analysis (branch)
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/AuthServiceApplication.java" \
            -Dsonar.coverage.exclusions="**/AuthServiceApplication.java,**/dto/**,**/*Entity.java,**/*Mapper.java,**/config/**"

      - name: Sonar analysis (pull request)
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/AuthServiceApplication.java" \
            -Dsonar.coverage.exclusions="**/AuthServiceApplication.java,**/dto/**,**/*Entity.java,**/*Mapper.java,**/config/**" \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      # On PRs we only verify the Dockerfile still builds; the real image is
      # built and pushed by the push-image job on develop/main.
      - name: Build Docker image (verify Dockerfile works)
        if: github.event_name == 'pull_request'
        run: docker build -t ${{ env.IMAGE_NAME }}:ci .

  # ---------------------------------------------------------------------------
  # CI (§1.2): push the image to ECR on every push to develop/main.
  # Credentials come from GitHub OIDC -> AWS role; no static keys anywhere.
  # ---------------------------------------------------------------------------
  push-image:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for configure-aws-credentials
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}

      - name: Compute image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IMAGE=${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          docker build -t $IMAGE:${{ steps.meta.outputs.tag }} .
          docker push $IMAGE:${{ steps.meta.outputs.tag }}
          # Movable branch alias (develop/main) for humans; deploys always pin the SHA tag.
          docker tag $IMAGE:${{ steps.meta.outputs.tag }} $IMAGE:${GITHUB_REF_NAME}
          docker push $IMAGE:${GITHUB_REF_NAME}

  # ---------------------------------------------------------------------------
  # CD (§1.3): deploy to EKS on push to main ONLY.
  # `helm upgrade --wait` + readiness probes gate the rollout: if the new pods
  # never go ready, this job FAILS and the old ReplicaSet keeps serving.
  # Manual rollback: helm rollback auth -n patricia-app
  # ---------------------------------------------------------------------------
  deploy:
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      - name: Deploy (helm upgrade, gated by --wait)
        run: |
          helm upgrade auth ./deploy \
            --install \
            --namespace patricia-app \
            --set image.repository=${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.push-image.outputs.image_tag }} \
            --wait --timeout 5m

      # Catches "ready but broken": the public health endpoint must answer
      # through ALB -> NGINX -> Gateway -> Auth.
      - name: Smoke check
        run: |
          for i in $(seq 1 10); do
            curl -sf "${{ vars.API_BASE_URL }}/auth/health" && exit 0
            sleep 6
          done
          echo "Smoke check failed: ${{ vars.API_BASE_URL }}/auth/health never answered 2xx"
          exit 1
