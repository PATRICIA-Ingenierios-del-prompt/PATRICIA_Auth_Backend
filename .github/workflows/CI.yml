name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: read

env:
  # Debe coincidir con el path del repo ECR: <registry>/patricia-dev/auth
  # (los repos ECR se llaman "${project}-${env}/${service}" = "patricia-dev/auth").
  IMAGE_NAME: patricia-dev/auth

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Integration tests (*IT) spin up Postgres/Redis through Testcontainers, which
    # uses the Docker daemon preinstalled on ubuntu-latest. No GitHub service
    # containers are needed — Testcontainers manages container lifecycle.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build, test & coverage
        run: mvn -B clean verify -Pcoverage

      # -------------------------------------------------------------------------
      # SonarCloud quality gate. Enable once the SonarCloud project + secrets
      # are configured. A failing quality gate blocks the PR into develop.
      # -------------------------------------------------------------------------
      - name: Sonar analysis (branch)
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/AuthServiceApplication.java" \
            -Dsonar.coverage.exclusions="**/AuthServiceApplication.java,**/dto/**,**/*Entity.java,**/*Mapper.java,**/config/**"

      - name: Sonar analysis (pull request)
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/AuthServiceApplication.java" \
            -Dsonar.coverage.exclusions="**/AuthServiceApplication.java,**/dto/**,**/*Entity.java,**/*Mapper.java,**/config/**" \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      # On PRs we only verify the Dockerfile still builds; the real image is
      # built and pushed by the push-image job on develop/main.
      - name: Build Docker image (verify Dockerfile works)
        if: github.event_name == 'pull_request'
        run: docker build -t ${{ env.IMAGE_NAME }}:ci .

  # ---------------------------------------------------------------------------
  # CI (§1.2): push the image to ECR on every push to develop/main.
  # Credentials come from GitHub OIDC -> AWS role; no static keys anywhere.
  # ---------------------------------------------------------------------------
  push-image:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for configure-aws-credentials
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}

      - name: Compute image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Idempotency check: ECR repos here have immutable tags, so re-running
      # this job on a commit that was already pushed (e.g. workflow re-run,
      # retry after a later step failed) would fail with "tag invalid ...
      # cannot be overwritten". If the tag already exists, skip the build/push
      # entirely — the existing image is reused as-is by the deploy job.
      - name: Check if image tag already exists in ECR
        id: check-image
        run: |
          if aws ecr describe-images \
              --repository-name ${{ env.IMAGE_NAME }} \
              --image-ids imageTag=${{ steps.meta.outputs.tag }} \
              --region ${{ vars.AWS_REGION }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # NOTE: unlike an earlier version of Gateway's workflow, we do NOT also
      # push a movable branch-name tag (e.g. `:main`). ECR repos here have
      # immutable tags, so re-pushing `:main` on every commit fails with
      # "tag invalid ... cannot be overwritten". The SHA tag is the only one
      # deploys ever use, so the branch alias isn't needed.
      - name: Build and push
        if: steps.check-image.outputs.exists == 'false'
        run: |
          IMAGE=${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          docker build -t $IMAGE:${{ steps.meta.outputs.tag }} .
          docker push $IMAGE:${{ steps.meta.outputs.tag }}

      - name: Skip push (tag already exists)
        if: steps.check-image.outputs.exists == 'true'
        run: echo "Tag ${{ steps.meta.outputs.tag }} already exists in ${{ env.IMAGE_NAME }} — reusing existing image."

  # ---------------------------------------------------------------------------
  # CD (§1.3): deploy to EKS on push to main ONLY.
  # `helm upgrade --wait` + readiness probes gate the rollout: if the new pods
  # never go ready, this job FAILS and the old ReplicaSet keeps serving.
  # Manual rollback: helm rollback auth -n patricia-app
  # ---------------------------------------------------------------------------
  deploy:
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      - name: Deploy (helm upgrade, gated by --wait)
        run: |
          helm upgrade auth ./deploy \
            --install \
            --namespace patricia-app \
            --set image.repository=${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.push-image.outputs.image_tag }} \
            --wait --timeout 5m

      - name: Smoke check
        run: |
          # Unlike Gateway, we always check in-cluster here, never the public
          # URL: the public ingress routes /auth to the `gateway` Service (see
          # Ulink_Infra/k8s/ingress-auth.yaml — backend is gateway, not auth),
          # and Auth has no actuator path exposed under the /auth/** prefix.
          # Hitting API_BASE_URL/actuator/health would only re-check Gateway's
          # own health, not prove Auth's pod is actually reachable.
          kubectl run smoke-auth-$GITHUB_RUN_ID --namespace patricia-app \
            --image=curlimages/curl:8.8.0 --restart=Never --rm -i --quiet \
            --command -- curl -sf --retry 10 --retry-delay 6 --retry-all-errors \
            http://auth.patricia-app.svc.cluster.local:8081/actuator/health